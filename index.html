<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>49 天英文衝刺導覽</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  /* ── CSS Variables ── */
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #231f35;
    --accent: #f5a623;
    --accent2: #e8547a;
    --teal: #3ec9c9;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
    --sidebar-w: 220px;
    --transition: 0.3s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Top Banner ── */
  .top-banner {
    background: linear-gradient(90deg, #1a1828 0%, #2a1f3d 50%, #1a1828 100%);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .banner-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .banner-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .update-badge {
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-section-label {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 14px 18px 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .day-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 18px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.82rem;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background var(--transition), color var(--transition);
    text-align: left;
    border-left: 3px solid transparent;
  }

  .day-btn:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text);
  }

  .day-btn.active {
    background: rgba(245,166,35,0.08);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 700;
  }

  .day-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent2);
    opacity: 0.7;
    min-width: 28px;
  }

  .day-btn.active .day-num { opacity: 1; }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── Scene Card ── */
  .scene-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: fadeSlide 0.35s ease forwards;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scene-hero {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6rem;
    position: relative;
    overflow: hidden;
  }

  .scene-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--hero-bg, linear-gradient(135deg,#1a1828,#2a1f3d));
    z-index: 0;
  }

  .scene-emoji {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .scene-body {
    padding: 22px 24px;
  }

  .scene-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    color: var(--teal);
    background: rgba(62,201,201,0.1);
    border: 1px solid rgba(62,201,201,0.25);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .scene-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .scene-desc {
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 1.7;
  }

  /* ── Phrases Section ── */
  .phrases-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeSlide 0.4s ease 0.05s both forwards;
    opacity: 0;
  }

  .phrases-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .phrases-icon {
    font-size: 1.2rem;
  }

  .phrases-title {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .phrase-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color var(--transition), transform var(--transition);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .phrase-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 3px 0 0 3px;
    opacity: 0;
    transition: opacity var(--transition);
  }

  .phrase-item:hover {
    border-color: rgba(245,166,35,0.35);
    transform: translateX(4px);
  }

  .phrase-item:hover::before { opacity: 1; }

  .phrase-en {
    font-size: 0.97rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 5px;
    font-family: 'JetBrains Mono', monospace;
  }

  .phrase-zh {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .phrase-note {
    font-size: 0.75rem;
    color: var(--teal);
    margin-top: 4px;
    opacity: 0.8;
  }

  /* ── Tips Card ── */
  .tips-card {
    background: linear-gradient(135deg, rgba(245,166,35,0.07), rgba(232,84,122,0.07));
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: var(--radius);
    padding: 20px 24px;
    animation: fadeSlide 0.45s ease 0.1s both forwards;
    opacity: 0;
  }

  .tips-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .tips-text {
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.75;
  }

  /* ── Nav Footer ── */
  .nav-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeSlide 0.5s ease 0.15s both forwards;
    opacity: 0;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.83rem;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all var(--transition);
  }

  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .progress-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
  }

  .progress-fill {
    color: var(--accent);
    font-weight: 700;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .layout { flex-direction: column; }
    .main { padding: 20px 16px; }
    .scene-hero { height: 140px; font-size: 4rem; }
  }
</style>
</head>

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let current = 0;

// ─────────────────────────────────────────────
//  RENDER SIDEBAR
// ─────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const weekLabels = ['Week 1 — 出發準備','Week 2 — 城市生活','Week 3 — 深度探索','Week 4 — 文化交流','Week 5 — 進階挑戰','Week 6 — 生活整合','Week 7 — 衝刺完賽'];
  let html = '';
  DAYS.forEach((day, idx) => {
    const weekIdx = Math.floor(idx / 7);
    if (idx % 7 === 0) {
      html += `<div class="sidebar-section-label">${weekLabels[weekIdx] || `Week ${weekIdx+1}`}</div>`;
    }
    html += `<button class="day-btn${idx===current?' active':''}" onclick="goTo(${idx})">
      <span class="day-num">D${String(day.id).padStart(2,'0')}</span>
      <span>${day.label}</span>
    </button>`;
  });
  sidebar.innerHTML = html;
}

// ─────────────────────────────────────────────
//  RENDER MAIN
// ─────────────────────────────────────────────
function renderMain() {
  const d = DAYS[current];
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="scene-card">
      <div class="scene-hero" style="--hero-bg:${d.heroBg}">
        <span class="scene-emoji">${d.emoji}</span>
      </div>
      <div class="scene-body">
        <div class="scene-tag">📍 ${d.tag}</div>
        <h2 class="scene-title">${d.title}</h2>
        <p class="scene-desc">${d.desc}</p>
      </div>
    </div>

    <div class="phrases-card">
      <div class="phrases-header">
        <span class="phrases-icon">💬</span>
        <span class="phrases-title">萬用句型 — 今日 ${d.phrases.length} 句</span>
      </div>
      <div class="phrase-list">
        ${d.phrases.map(p=>`
          <div class="phrase-item">
            <div class="phrase-en">${p.en}</div>
            <div class="phrase-zh">${p.zh}</div>
            ${p.note ? `<div class="phrase-note">${p.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>

    <div class="tips-card">
      <div class="tips-label">✨ 今日學習小技巧</div>
      <p class="tips-text">${d.tip}</p>
    </div>

    <div class="nav-footer">
      <button class="nav-btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← 前一天</button>
      <span class="progress-pill"><span class="progress-fill">${current+1}</span> / 49</span>
      <button class="nav-btn" onclick="goTo(${current+1})" ${current===48?'disabled':''}>後一天 →</button>
    </div>
  `;
  main.scrollTo({ top:0, behavior:'smooth' });
}

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function goTo(idx) {
  if (idx < 0 || idx >= DAYS.length) return;
  current = idx;
  renderSidebar();
  renderMain();
  // Scroll sidebar button into view
  const btns = document.querySelectorAll('.day-btn');
  btns[idx]?.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderSidebar();
renderMain();
</script>
