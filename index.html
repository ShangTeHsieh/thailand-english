<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 ACI 泰國年會：SRS 智能口說戰情室</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="data.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <style>
    /* ── 基礎色彩與排版 ── */
    :root {
      --bg: #0f0e17; --surface: #1a1828; --surface2: #231f35;
      --accent: #f5a623; --accent2: #e8547a; --teal: #3ec9c9; --text: #fffffe;
      --text-muted: #a7a9be; --border: rgba(255,255,255,0.07);
      --radius: 14px; --sidebar-w: 260px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; display: flex; height: 100vh; overflow: hidden; }
    
    /* ── 側邊欄 (Sidebar) ── */
    #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .day-list { flex: 1; overflow-y: auto; padding: 10px; }
    .day-item { width: 100%; padding: 12px; margin-bottom: 4px; border: none; background: transparent; color: var(--text-muted); text-align: left; border-radius: var(--radius); cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
    .day-item:hover { background: var(--surface2); color: var(--text); }
    .day-item.active { background: var(--accent); color: var(--bg); font-weight: 600; }

    /* ── 主畫面 (Main Content) ── */
    #main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
    .top-banner { padding: 15px 30px; background: rgba(15,14,23,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    
    .countdown-text { font-family: 'JetBrains Mono'; color: var(--accent2); font-weight: bold; font-size: 0.85rem; }
    
    .mode-btn { background: var(--teal); border: none; color: var(--bg); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: bold; box-shadow: 0 4px 15px rgba(62,201,201,0.3); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
    .mode-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(62,201,201,0.5); }
    .mode-btn.disabled { background: var(--surface2); color: var(--text-muted); box-shadow: none; cursor: not-allowed; transform: none; }

    .content-container { max-width: 800px; margin: 30px auto; padding: 0 20px; width: 100%; }
    
    /* ── 句型清單卡片 ── */
    .phrase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 15px; position: relative; transition: 0.3s; }
    .phrase-card.mastered { border-color: var(--teal); background: rgba(62,201,201,0.05); }
    .phrase-en { font-family: 'Playfair Display'; font-size: 1.3rem; color: var(--accent); margin-bottom: 8px; padding-right: 90px; line-height: 1.3; }
    .phrase-zh { font-size: 0.95rem; color: var(--text-muted); }
    
    .action-group { position: absolute; right: 20px; top: 20px; display: flex; gap: 8px; }
    .icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 1rem; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.active { background: var(--teal); color: var(--bg); border-color: var(--teal); }

    .scenario-badge { font-size: 0.7rem; background: var(--accent2); color: white; padding: 3px 8px; border-radius: 4px; margin-bottom: 12px; display: inline-block; font-weight: bold; letter-spacing: 1px; }

    /* ── SRS 字卡彈出視窗 ── */
    #flashcard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,14,23,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    .card { width: 100%; max-width: 500px; min-height: 300px; background: var(--surface2); border: 2px solid var(--accent); border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; cursor: pointer; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .card-content { font-family: 'Playfair Display'; font-size: 1.8rem; color: var(--accent); line-height: 1.4; }
    .card-zh { font-family: 'Noto Sans TC'; font-size: 1.2rem; color: var(--teal); margin-top: 25px; font-weight: 500; }
    .card-counter { position: absolute; top: 20px; left: 30px; font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--text-muted); }
    .card-hint { position: absolute; bottom: 20px; font-size: 0.8rem; color: var(--text-muted); opacity: 0.7; }
    
    /* SRS 評分按鈕 */
    .srs-nav { display: flex; gap: 10px; margin-top: 30px; width: 100%; max-width: 500px; justify-content: space-between; display: none; }
    .srs-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 15px 5px; border-radius: 15px; cursor: pointer; text-align: center; font-size: 0.95rem; font-weight: bold; transition: 0.2s; }
    .srs-btn:hover { transform: translateY(-3px); background: var(--surface2); }
    .srs-btn span { display: block; font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; font-weight: normal; font-family: 'JetBrains Mono'; }
    .srs-btn.again { border-bottom: 4px solid #e8547a; }
    .srs-btn.hard { border-bottom: 4px solid #f5a623; }
    .srs-btn.good { border-bottom: 4px solid #3ec9c9; }
    .srs-btn.easy { border-bottom: 4px solid #4a90e2; }

    /* ── 底部導覽 ── */
    .nav-footer { margin-top: 40px; padding-bottom: 60px; display: flex; justify-content: space-between; }
    .nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
    .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── RWD 手機版優化 ── */
    @media (max-width: 850px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; height: 80px; border-right: none; border-bottom: 1px solid var(--border); }
      .day-list { display: flex; overflow-x: auto; padding: 10px; gap: 10px; }
      .day-item { white-space: nowrap; width: auto; margin-bottom: 0; padding: 10px 15px; }
      .sidebar-header { display: none; }
      .phrase-en { font-size: 1.15rem; padding-right: 70px; }
      .card-content { font-size: 1.4rem; }
      .srs-nav { flex-wrap: wrap; }
      .srs-btn { min-width: 45%; }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header"><h2 style="font-size: 1rem; color: var(--accent);">🇹🇭 ACI 衝刺進度表</h2></div>
  <div id="day-list" class="day-list"></div>
</aside>

<main id="main">
  <header class="top-banner">
    <div>
      <div style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted);">主題：<span id="current-theme-name" style="color: var(--text);">載入中</span></div>
      <div id="countdown" class="countdown-text">距離年會倒數計算中...</div>
    </div>
    <div class="btn-group">
      <button class="mode-btn" style="background: var(--surface2); color: var(--text);" onclick="openSyncModal()">🔄 跨裝置同步</button>
      <button id="start-srs-btn" class="mode-btn" onclick="openFlashcards()">
        🎴 SRS 總複習 (<span id="due-count">0</span>)
      </button>
    </div>
  </header>
  <div id="content-container" class="content-container"></div>
</main>

<div id="flashcard-overlay">
  <button style="position:absolute; top:20px; right:20px; background:var(--surface); border:1px solid var(--border); color:var(--text); width:40px; height:40px; border-radius:50%; font-size:1.2rem; cursor:pointer;" onclick="closeFlashcards()">✕</button>
  
  <div class="card" onclick="flipCard()">
    <div id="card-count" class="card-counter">0 / 0</div>
    <div id="card-en" class="card-content">載入中...</div>
    <div id="card-zh" class="card-zh" style="display:none;"></div>
    <div id="card-hint" class="card-hint">點擊卡片翻面</div>
  </div>
  
  <div id="srs-nav" class="srs-nav">
    <button class="srs-btn again" onclick="handleSRS('again', event)">Again<br><span>< 1m</span></button>
    <button class="srs-btn hard" onclick="handleSRS('hard', event)">Hard<br><span>1d</span></button>
    <button class="srs-btn good" onclick="handleSRS('good', event)">Good<br><span>3d</span></button>
    <button class="srs-btn easy" onclick="handleSRS('easy', event)">Easy<br><span>7d</span></button>
  </div>

  <div id="end-nav" class="srs-nav" style="display: none; justify-content: center;">
    <button class="srs-btn good" onclick="loadMoreNewCards(event)" style="flex:none; padding:15px 30px; font-size:1.1rem;">
      ➕ 學習 5 句新進度
    </button>
  </div>

</div>

<div id="sync-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,14,23,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px);">
  <div style="background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
    <h3 style="color: var(--accent); margin-bottom: 10px; font-size: 1.3rem;">🔄 跨裝置進度同步</h3>
    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; line-height: 1.5;">由於網頁無法自動寫入 GitHub 檔案，請透過「進度代碼」來轉移你的學習紀錄。</p>
    
    <textarea id="sync-code" style="width: 100%; height: 120px; background: var(--bg); color: var(--teal); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; font-family: 'JetBrains Mono'; font-size: 0.85rem; word-break: break-all; resize: none;" placeholder="在此貼上你的進度代碼..."></textarea>
    
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
      <button onclick="copySyncCode()" style="flex: 1; padding: 12px; background: var(--teal); color: var(--bg); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">📋 1. 複製目前進度</button>
      <button onclick="importSyncCode()" style="flex: 1; padding: 12px; background: var(--accent2); color: var(--text); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">📥 2. 匯入上方代碼</button>
    </div>
    <button onclick="closeSyncModal()" style="width: 100%; padding: 10px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 10px; cursor: pointer;">關閉</button>
  </div>
</div>

<script>
  let currentDayIdx = 0;
  // SRS 資料格式: { "dayId-phraseEn": { nextReview: timestamp, interval: days } }
  let srsData = JSON.parse(localStorage.getItem('aci_srs_data')) || {};
  let dueFlashcards = [];
  let flashIdx = 0;
  let isFlipped = false;
  // 📊 新增：用來記錄每一次 10 張番茄鐘的點擊數據
  let sessionStats = { again: 0, hard: 0, good: 0, easy: 0 };

  /* ── 跨裝置同步邏輯 ── */
  function openSyncModal() {
    document.getElementById('sync-overlay').style.display = 'flex';
    if (Object.keys(srsData).length > 0) {
      // 🚀 修正：使用 LZString 進行深度壓縮，再轉成 Base64
      const code = LZString.compressToBase64(JSON.stringify(srsData));
      document.getElementById('sync-code').value = code;
    } else {
      document.getElementById('sync-code').value = '';
    }
  }

  function closeSyncModal() {
    document.getElementById('sync-overlay').style.display = 'none';
  }

  function copySyncCode() {
    const codeArea = document.getElementById('sync-code');
    if (!codeArea.value) {
      alert('⚠️ 目前沒有進度可以複製！');
      return;
    }
    codeArea.select();
    navigator.clipboard.writeText(codeArea.value).then(() => {
      alert('✅ 進度代碼已複製！你可以傳到自己的 Line，稍後在其他裝置貼上匯入。');
    }).catch(err => {
      alert('❌ 複製失敗，請手動全選複製。');
    });
  }

  function importSyncCode() {
    const code = document.getElementById('sync-code').value.trim();
    if (!code) {
      alert('⚠️ 請先在上方框框貼上你的進度代碼！');
      return;
    }
    try {
      // 解碼並覆蓋目前的紀錄
      // 🚀 修正：使用 LZString 將壓縮碼還原回原本的資料
      const decodedData = JSON.parse(LZString.decompressFromBase64(code));
      srsData = decodedData;
      localStorage.setItem('aci_srs_data', JSON.stringify(srsData));
      
      calculateDueCards();
      renderMain();
      
      alert('🎉 進度匯入成功！系統已更新為最新狀態。');
      closeSyncModal();
    } catch (e) {
      alert('❌ 無效的代碼！請確認你複製的代碼完整無缺。');
    }
  }

  // 倒數計時計算
  function updateHeader() {
    const targetDate = new Date('2026-05-11T00:00:00');
    const now = Date.now();
    const diff = targetDate - now;
    const daysLeft = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
    
    if (daysLeft === 0) {
      document.getElementById('countdown').innerText = `🚀 2026/05/11-16 曼谷 ACI 年會正式展開！`;
    } else {
      document.getElementById('countdown').innerText = `🚀 2026/05/11 曼谷 ACI 年會倒數：${daysLeft} 天`;
    }
  }


  // 語音朗讀 API
  function speak(text, event) {
    if(event) event.stopPropagation(); // 避免點擊朗讀時觸發其他事件
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
  }

  // 升級：計算需要複習的卡片，若無卡片會顯示「🆕 學習新進度」
  function calculateDueCards() {
    const now = Date.now();
    let allDue = [];
    let newCardsCount = 0;
    if(typeof DAYS === 'undefined') return;

    DAYS.forEach(d => {
      d.phrases.forEach(p => {
        const pId = `${d.id}-${p.en}`;
        const record = srsData[pId];
        if (record && record.nextReview <= now) {
          allDue.push({ ...p, dayId: d.id, pId: pId, currentInterval: record.interval });
        } else if (!record) {
          newCardsCount++; 
        }
      });
    });

    const totalDue = allDue.length;
    // 🛡️ 擷取前 10 張卡片進行本次測驗
    dueFlashcards = allDue.length > 10 ? allDue.slice(0, 10) : allDue;

    const srsBtn = document.getElementById('start-srs-btn');
    if(totalDue === 0) {
      if (newCardsCount > 0) {
        srsBtn.classList.remove('disabled');
        let displayNewCount = newCardsCount > 10 ? 10 : newCardsCount;
        srsBtn.innerHTML = `🆕 學習新進度 (<span style="color:#fff;">${displayNewCount} / 共 ${newCardsCount}</span>)`;
      } else {
        srsBtn.classList.add('disabled');
        srsBtn.innerHTML = `🎉 恭喜！全數攻略`;
      }
    } else {
      srsBtn.classList.remove('disabled');
      srsBtn.innerHTML = `🎴 SRS 總複習 (<span style="color:#fff;">本次 ${dueFlashcards.length} / 待複習 ${totalDue}</span>)`;
    }
  }

  function playAudioSecure(element, event) {
    if(event) event.stopPropagation();
    const text = element.getAttribute('data-en');
    speak(text, null); // 呼叫原有的發音 API
  }

  // 🛡️ 新增：自動從題庫中抽出 5 張「未學習」的新卡片
  function pullNewCards(count = 5) {
    let added = 0;
    if(typeof DAYS === 'undefined') return 0;
    
    for(let d of DAYS) {
      for(let p of d.phrases) {
        const pId = `${d.id}-${p.en}`;
        if(!srsData[pId]) {
          // 找到新卡片，加入這次的複習佇列
          dueFlashcards.push({ ...p, dayId: d.id, pId: pId, currentInterval: 0 });
          // 將它正式寫入學習紀錄，設定為立刻複習
          srsData[pId] = { nextReview: Date.now(), interval: 0 };
          added++;
          if(added >= count) break;
        }
      }
      if(added >= count) break;
    }
    localStorage.setItem('aci_srs_data', JSON.stringify(srsData));
    return added;
  }

  // 按鈕觸發：載入更多新卡片
  function loadMoreNewCards(event) {
    if(event) event.stopPropagation();
    sessionStats = { again: 0, hard: 0, good: 0, easy: 0 }; // 重置統計
    const added = pullNewCards(5);
    if (added > 0) {
      isFlipped = false; 
      document.getElementById('end-nav').style.display = 'none';
      updateFlashcard();
    }
  }

  // 🛡️ 三段式狀態切換：未學習 ➕ -> 複習中 🔄 -> 已熟練 ✅
  function toggleStateSecure(element, event) {
    if(event) event.stopPropagation();
    const pId = element.getAttribute('data-id');
    const now = Date.now();
    const record = srsData[pId];

    if (!record) {
      // 狀態 1 轉 2：未學習 -> 加入複習 (設定為立刻複習)
      srsData[pId] = { nextReview: now, interval: 0 };
    } else if (record.interval < 7) {
      // 狀態 2 轉 3：複習中 -> 標記為已熟練 (設定間隔 7 天)
      srsData[pId] = { nextReview: now + (7 * 24 * 60 * 60 * 1000), interval: 7 };
    } else {
      // 狀態 3 轉 1：已熟練 -> 退回未學習狀態
      delete srsData[pId];
    }

    localStorage.setItem('aci_srs_data', JSON.stringify(srsData));
    calculateDueCards();
    renderMain();
  }

  /* ── SRS 字卡邏輯 ── */
  function openFlashcards() {
    sessionStats = { again: 0, hard: 0, good: 0, easy: 0 }; // 重置統計
    calculateDueCards();
    if (dueFlashcards.length === 0) {
      const added = pullNewCards(5); 
      if (added === 0) return; 
    }
    
    flashIdx = 0;
    isFlipped = false;
    document.getElementById('flashcard-overlay').style.display = 'flex';
    document.getElementById('srs-nav').style.display = 'none';
    const endNav = document.getElementById('end-nav');
    if(endNav) endNav.style.display = 'none';
    updateFlashcard();
  }

  function closeFlashcards() {
    document.getElementById('flashcard-overlay').style.display = 'none';
    calculateDueCards();
    renderMain();
  }

  function updateFlashcard() {
    if (flashIdx >= dueFlashcards.length) {
      const motivations = [
        "太神啦！你的大腦又進化了一次！🧠",
        "積沙成塔，離泰國 ACI 講台又更近了一步！✈️",
        "超讚！少量多次是轉化為肌肉記憶的最佳途徑！☕"
      ];
      const randomMoti = motivations[Math.floor(Math.random() * motivations.length)];

      // 📊 生成戰報 HTML
      const statsHtml = `
        <div style="background: rgba(0,0,0,0.25); padding: 15px 25px; border-radius: 15px; margin: 20px auto; font-size: 0.95rem; text-align: left; display: inline-block; border: 1px solid var(--border);">
          <div style="color: #4a90e2; margin-bottom: 8px; font-weight: bold;">✅ 輕鬆秒殺 (Easy): ${sessionStats.easy} 次</div>
          <div style="color: #3ec9c9; margin-bottom: 8px; font-weight: bold;">👍 表現不錯 (Good): ${sessionStats.good} 次</div>
          <div style="color: #f5a623; margin-bottom: 8px; font-weight: bold;">🤔 稍微卡頓 (Hard): ${sessionStats.hard} 次</div>
          <div style="color: #e8547a; font-weight: bold;">🔥 繼續努力 (Again): ${sessionStats.again} 次</div>
        </div>
      `;

      document.getElementById('card-en').innerText = "🎉 本輪訓練達標！";
      document.getElementById('card-zh').innerHTML = `${randomMoti}<br>${statsHtml}<br><span style="font-size:0.85rem; color:var(--text-muted);">大腦正在建立強大的神經連結！</span>`;
      document.getElementById('card-zh').style.display = 'block';
      document.getElementById('card-hint').style.display = 'none';
      document.getElementById('card-count').innerText = `剩餘 0 張`;
      document.getElementById('srs-nav').style.display = 'none';

      let hasDue = false;
      let hasNew = false;
      const now = Date.now();
      DAYS.forEach(d => d.phrases.forEach(p => { 
        const rec = srsData[`${d.id}-${p.en}`];
        if (rec && rec.nextReview <= now) hasDue = true; 
        if (!rec) hasNew = true;
      }));
      
      const endNav = document.getElementById('end-nav');
      if(endNav) {
        endNav.style.display = 'flex'; 
        if(hasDue) {
          endNav.innerHTML = `<button class="srs-btn good" onclick="closeFlashcards(); openFlashcards();" style="flex:none; padding:15px 30px; font-size:1.1rem;">🔥 繼續下一輪 (10張)</button>`;
        } else if (hasNew) {
          endNav.innerHTML = `<button class="srs-btn good" onclick="loadMoreNewCards(event)" style="flex:none; padding:15px 30px; font-size:1.1rem;">➕ 學習 5 句新進度</button>`;
        } else {
          endNav.innerHTML = `<button class="srs-btn easy" onclick="closeFlashcards()" style="flex:none; padding:15px 30px; font-size:1.1rem;">✅ 今日任務全數通關！</button>`;
        }
      }
      return;
    }
    
    const item = dueFlashcards[flashIdx];
    document.getElementById('card-en').innerText = item.en;
    document.getElementById('card-zh').innerText = item.zh;
    document.getElementById('card-zh').style.display = isFlipped ? 'block' : 'none';
    document.getElementById('card-hint').style.display = isFlipped ? 'none' : 'block';
    
    const remaining = dueFlashcards.length - flashIdx;
    document.getElementById('card-count').innerText = `剩餘 ${remaining} 張`;
    
    document.getElementById('srs-nav').style.display = isFlipped ? 'flex' : 'none';
    const endNav = document.getElementById('end-nav');
    if(endNav) endNav.style.display = 'none';
    
    if (!isFlipped) speak(item.en, null);
  }

  function flipCard() {
    if (isFlipped) return; 
    isFlipped = true;
    updateFlashcard();
  }

  function handleSRS(rating, event) {
    event.stopPropagation();
    const item = dueFlashcards[flashIdx];
    let nextInterval = 0;

    sessionStats[rating]++; // 📊 紀錄點擊了哪個按鈕

    if (rating === 'again') nextInterval = 0;
    else if (rating === 'hard') nextInterval = Math.max(1, item.currentInterval * 1.2);
    else if (rating === 'good') nextInterval = Math.max(3, item.currentInterval === 0 ? 3 : item.currentInterval * 2.5);
    else if (rating === 'easy') nextInterval = Math.max(7, item.currentInterval === 0 ? 7 : item.currentInterval * 3.5);

    const now = Date.now();
    const nextReviewTime = rating === 'again' ? now + 60000 : now + (nextInterval * 24 * 60 * 60 * 1000);

    srsData[item.pId] = { nextReview: nextReviewTime, interval: nextInterval };
    localStorage.setItem('aci_srs_data', JSON.stringify(srsData));

    if (rating === 'again') dueFlashcards.push(item);

    flashIdx++;
    isFlipped = false;
    updateFlashcard();
  }

  /* ── 渲染畫面 ── */
  function renderSidebar() {
    const list = document.getElementById('day-list');
    list.innerHTML = DAYS.map((d, i) => `
      <button class="day-item ${i === currentDayIdx ? 'active' : ''}" onclick="goTo(${i})">
        <span style="font-size:0.7rem; opacity:0.7;">${d.date} | ${d.theme}</span>
        <span style="font-size:0.9rem; margin-top:3px;">${d.emoji} Day ${d.id} - ${d.label}</span>
      </button>
    `).join('');
  }

  function renderMain() {
    const container = document.getElementById('content-container');
    const d = DAYS[currentDayIdx];
    const now = Date.now();
    
    document.getElementById('current-theme-name').innerText = d.theme;
    
    container.innerHTML = `
      <div style="margin-bottom: 35px;">
        <h1 style="font-size: 2rem; margin-bottom:10px;">${d.title}</h1>
        <p style="color: var(--text-muted); font-size: 1.05rem; line-height: 1.6;">${d.desc}</p>
      </div>
      <div id="phrases-area">
        ${d.phrases.map(p => {
          const pId = `${d.id}-${p.en}`;
          const record = srsData[pId];
          
          const safeDataEn = p.en.replace(/"/g, '&quot;');
          const safeDataId = pId.replace(/"/g, '&quot;');
          
          let btnIcon = '➕';
          let btnClass = '';
          let btnStyle = '';
          let btnTitle = '未學習 (點擊加入總複習)';
          let cardClass = '';

          // 🛡️ 修正：只有間隔天數 >= 7 天，才算是真正的「✅ 已熟練」
          if (record) {
            if (record.interval >= 7) {
              btnIcon = '✅';
              btnClass = 'active'; // 藍綠色
              btnTitle = '已熟練 (點擊退回未學習)';
              cardClass = 'mastered';
            } else {
              btnIcon = '🔄';
              btnStyle = 'color: var(--accent); border-color: var(--accent);'; // 橘黃色
              btnTitle = '複習中 (點擊直接標記熟練)';
            }
          }
          
          return `
            <div class="phrase-card ${cardClass}">
              <span class="scenario-badge">${p.scenario || '通用情境'}</span>
              <div class="action-group">
                <button class="icon-btn" onclick="playAudioSecure(this, event)" data-en="${safeDataEn}" title="聽發音">🔊</button>
                <button class="icon-btn ${btnClass}" style="${btnStyle}" onclick="toggleStateSecure(this, event)" data-id="${safeDataId}" title="${btnTitle}">${btnIcon}</button>
              </div>
              <div class="phrase-en" onclick="playAudioSecure(this, event)" data-en="${safeDataEn}" style="cursor:pointer">${p.en}</div>
              <div class="phrase-zh">${p.zh}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="nav-footer">
        <button class="nav-btn" onclick="goTo(${currentDayIdx-1})" ${currentDayIdx === 0 ? 'disabled' : ''}>← 前一天</button>
        <button class="nav-btn" onclick="goTo(${currentDayIdx+1})" ${currentDayIdx === DAYS.length-1 ? 'disabled' : ''}>後一天 →</button>
      </div>
    `;
  }

  function goTo(idx) {
    if (idx < 0 || idx >= DAYS.length) return;
    currentDayIdx = idx;
    renderSidebar(); renderMain();
    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateHeader();
    if (typeof DAYS !== 'undefined' && DAYS.length > 0) {
      calculateDueCards();
      renderSidebar();
      renderMain();
    } else {
      document.getElementById('content-container').innerHTML = `<h2 style="color:var(--accent);">⚠️ 找不到 data.js，請確認檔案已建立。</h2>`;
    }
  });
</script>
</body>
</html>
